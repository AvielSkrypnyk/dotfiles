name: Sync README On Main

concurrency:
  group: sync-readme-on-main
  cancel-in-progress: true

'on':
  push:
    branches:
      - main
    # Avoid self-trigger loops when this workflow updates README.
    paths-ignore:
      - README.md

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    # Skip the run triggered by this workflow's own sync commit.
    if: >-
      ${{ github.event_name != 'push' || github.event.head_commit.message != 'chore: sync readme metadata' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Build README metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          UPDATED=$(gh repo view "${{ github.repository }}" \
            --json pushedAt -q '.pushedAt')

          PRS=$(gh pr list \
            --state open \
            --json number \
            --jq 'length')

          # The sync PR itself adds one commit after merge.
          COMMITS=$(( $(git rev-list --count origin/main) + 1 ))

          cat > stats.txt << EOF
          \`\`\`text
          Commits     : $COMMITS
          Open PRs    : $PRS
          Last Update : ${UPDATED%%T*}
          \`\`\`
          EOF

          # Rebuild the README structure snapshot from tracked dotfiles folders.
          python3 .github/scripts/generate_structure_tree.py > structure.txt

      - name: Update README blocks
        run: |
          # Replace only generated blocks and keep all other README lines untouched.
          # This first pass updates STRUCTURE between explicit markers.
          awk '
          BEGIN { in_block=0 }
          /<!-- STRUCTURE -->/ {
            print
            system("cat structure.txt")
            in_block=1
            next
          }
          /<!-- \/STRUCTURE -->/ {
            in_block=0
            print
            next
          }
          !in_block
          ' README.md > README.new
          mv README.new README.md

          # This second pass updates STATS between explicit markers.
          awk '
          BEGIN { in_block=0 }
          /<!-- STATS -->/ {
            print
            system("cat stats.txt")
            in_block=1
            next
          }
          /<!-- \/STATS -->/ {
            in_block=0
            print
            next
          }
          !in_block
          ' README.md > README.new
          mv README.new README.md

      - name: Create pull request
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          sign-commits: true
          add-paths: README.md
          commit-message: "chore: sync readme metadata"
          base: "main"
          branch: "chore/sync-readme-main"
          delete-branch: true
          title: "chore: sync readme metadata"
          body: |
            Automated README structure and stats refresh after main changes.

      - name: Merge PR when possible
        if: steps.create_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.create_pr.outputs.pull-request-number }}"

          # Try auto-merge first; if repository auto-merge is disabled, merge immediately.
          gh pr merge --auto --squash "$PR_NUMBER" || \
            gh pr merge --squash --delete-branch "$PR_NUMBER"
