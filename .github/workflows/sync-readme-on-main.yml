name: Sync README On Main

concurrency:
  group: sync-readme-on-main
  cancel-in-progress: true

'on':
  push:
    branches:
      - main
    paths-ignore:
      - README.md

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    if: >-
      ${{ github.event_name != 'push' || github.event.head_commit.message != 'chore: sync readme metadata' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Build README metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          UPDATED=$(gh repo view "${{ github.repository }}" \
            --json pushedAt -q '.pushedAt')

          PRS=$(gh pr list \
            --state open \
            --json number \
            --jq 'length')

          # The sync PR itself adds one commit after merge.
          COMMITS=$(( $(git rev-list --count origin/main) + 1 ))

          cat > stats.txt << EOF
          \`\`\`text
          Commits     : $COMMITS
          Open PRs    : $PRS
          Last Update : ${UPDATED%%T*}
          \`\`\`
          EOF

          # Rebuild the README structure snapshot from tracked dotfiles folders.
          python3 - << 'PY' > structure.txt
          from pathlib import Path

          roots = ["bootstrap", "common", "linux", "macos", "windows"]

          def sorted_entries(path: Path):
              entries = [p for p in path.iterdir() if p.name != ".git"]
              return sorted(entries, key=lambda p: (not p.is_dir(), p.name.lower(), p.name))

          def walk(path: Path, prefix: str):
              entries = sorted_entries(path)
              for i, entry in enumerate(entries):
                  last = i == len(entries) - 1
                  connector = "└── " if last else "├── "
                  name = entry.name + "/" if entry.is_dir() else entry.name
                  print(prefix + connector + name)
                  if entry.is_dir():
                      walk(entry, prefix + ("    " if last else "│   "))

          print("```text")
          print("dotfiles/")
          present_roots = [r for r in roots if Path(r).exists()]
          for root_name in present_roots:
              root = Path(root_name)
              last_root = root_name == present_roots[-1]
              connector = "└── " if last_root else "├── "
              print(connector + root_name + "/")
              walk(root, "    " if last_root else "│   ")
          print("```")
          PY

      - name: Update README blocks
        run: |
          # Replace only generated blocks and keep all other README lines untouched.
          awk '
          BEGIN { in_block=0 }
          /<!-- STRUCTURE -->/ {
            print
            system("cat structure.txt")
            in_block=1
            next
          }
          /<!-- \/STRUCTURE -->/ {
            in_block=0
            print
            next
          }
          !in_block
          ' README.md > README.new
          mv README.new README.md

          awk '
          BEGIN { in_block=0 }
          /<!-- STATS -->/ {
            print
            system("cat stats.txt")
            in_block=1
            next
          }
          /<!-- \/STATS -->/ {
            in_block=0
            print
            next
          }
          !in_block
          ' README.md > README.new
          mv README.new README.md

      - name: Create pull request
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          sign-commits: true
          add-paths: README.md
          commit-message: "chore: sync readme metadata"
          base: "main"
          branch: "chore/sync-readme-main"
          delete-branch: true
          title: "chore: sync readme metadata"
          body: |
            Automated README structure and stats refresh after main changes.

      - name: Merge PR when possible
        if: steps.create_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.create_pr.outputs.pull-request-number }}"

          # Try repository auto-merge first; if it's disabled, attempt immediate merge.
          gh pr merge --auto --squash "$PR_NUMBER" || \
            gh pr merge --squash --delete-branch "$PR_NUMBER"
