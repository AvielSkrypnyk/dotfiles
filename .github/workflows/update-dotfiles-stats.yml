name: Update Dotfiles Stats

concurrency:
  group: update-dotfiles-stats
  cancel-in-progress: true

'on':
  push:
    paths-ignore:
      - README.md

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: >-
      ${{ !startsWith(github.ref_name, 'chore/update-dotfiles-stats') &&
      github.ref_name != 'main' &&
      (github.event_name != 'push' || github.event.head_commit.message != 'chore: update repository stats') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Collect statistics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          UPDATED=$(gh repo view "${{ github.repository }}" \
            --json pushedAt -q '.pushedAt')

          PRS=$(gh pr list \
            --state open \
            --json number \
            --jq 'length')

          COMMITS=$(git rev-list --count HEAD)

          cat > stats.txt << EOF
          \`\`\`text
          Commits     : $COMMITS
          Open PRs    : $PRS
          Last Update : ${UPDATED%%T*}
          \`\`\`
          EOF

      - name: Update README
        run: |
          awk '
          BEGIN { in_block=0 }
          /<!-- STATS -->/ {
            print
            system("cat stats.txt")
            in_block=1
            next
          }
          /<!-- \/STATS -->/ {
            in_block=0
            print
            next
          }
          !in_block
          ' README.md > README.new

          mv README.new README.md

      - name: Commit stats update to source branch
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          git add README.md
          git diff --cached --quiet && exit 0

          git commit -m "chore: update repository stats"
          git push origin "HEAD:${{ github.ref_name }}"
