name: Update Dotfiles Stats

concurrency:
  group: update-dotfiles-stats
  cancel-in-progress: true

'on':
  push:
    branches:
      - main
      - dev
    paths:
      - .github/workflows/update-dotfiles-stats.yml

  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect statistics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          UPDATED=$(gh repo view "${{ github.repository }}" \
            --json pushedAt -q '.pushedAt')

          PRS=$(gh pr list \
            --state open \
            --json number \
            --jq 'length')

          COMMITS=$(git rev-list --count HEAD)

          cat > stats.txt << EOF
          \`\`\`text
          Commits     : $COMMITS
          Open PRs    : $PRS
          Last Update : ${UPDATED%%T*}
          \`\`\`
          EOF

      - name: Update README
        run: |
          awk '
          BEGIN { in_block=0 }
          /<!-- STATS -->/ {
            print
            system("cat stats.txt")
            in_block=1
            next
          }
          /<!-- \/STATS -->/ {
            in_block=0
            print
            next
          }
          !in_block
          ' README.md > README.new

          mv README.new README.md

      - name: Create pull request with stats update
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          add-paths: README.md
          commit-message: "chore: update repository stats"
          branch: "chore/update-dotfiles-stats"
          delete-branch: true
          title: "chore: update repository stats"
          body: |
            Automated README stats refresh from GitHub Actions.
