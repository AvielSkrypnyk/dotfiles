name: Update Dotfiles Stats

concurrency:
  group: update-dotfiles-stats
  cancel-in-progress: true

'on':
  push:
    branches-ignore:
      - main
    paths-ignore:
      - README.md

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    if: >-
      ${{ !startsWith(github.ref_name, 'chore/update-dotfiles-stats') &&
      (github.event_name != 'push' || github.event.head_commit.message != 'chore: update repository stats') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Collect statistics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH_NAME="${{ github.ref_name }}"

          # Keep commit count aligned with main, then account for this branch's upcoming squash merge commit.
          git fetch origin main --quiet

          UPDATED=$(gh repo view "${{ github.repository }}" \
            --json pushedAt -q '.pushedAt')

          # Exclude the current branch PR so this metric reflects other open PRs.
          CURRENT_BRANCH_PR=$(gh pr list \
            --state open \
            --head "$BRANCH_NAME" \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$CURRENT_BRANCH_PR" ]; then
            PRS=$(gh pr list \
              --state open \
              --json number \
              --jq "[.[] | select(.number != $CURRENT_BRANCH_PR)] | length")
          else
            PRS=$(gh pr list \
              --state open \
              --json number \
              --jq 'length')
          fi

          # Show the expected post-merge total seen on main.
          COMMITS=$(( $(git rev-list --count origin/main) + 1 ))

          cat > stats.txt << EOF
          \`\`\`text
          Commits     : $COMMITS
          Open PRs    : $PRS
          Last Update : ${UPDATED%%T*}
          \`\`\`
          EOF

      - name: Update README
        run: |
          # Only refresh the STATS block in this workflow.
          awk '
          BEGIN { in_block=0 }
          /<!-- STATS -->/ {
            print
            system("cat stats.txt")
            in_block=1
            next
          }
          /<!-- \/STATS -->/ {
            in_block=0
            print
            next
          }
          !in_block
          ' README.md > README.new

          mv README.new README.md

      - name: Create pull request with stats update
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          sign-commits: true
          add-paths: README.md
          commit-message: "chore: update repository stats"
          base: "main"
          branch: "chore/update-dotfiles-stats"
          delete-branch: true
          title: "chore: update repository stats"
          body: |
            Automated README stats refresh from GitHub Actions.

      - name: Merge PR when possible
        if: steps.create_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.create_pr.outputs.pull-request-number }}"

          # Try repository auto-merge first; if it's disabled, attempt immediate merge.
          gh pr merge --auto --squash "$PR_NUMBER" || \
            gh pr merge --squash --delete-branch "$PR_NUMBER"
