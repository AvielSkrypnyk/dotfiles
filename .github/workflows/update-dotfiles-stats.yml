name: Update Dotfiles Stats

concurrency:
  group: update-dotfiles-stats
  cancel-in-progress: true

'on':
  push:
    paths-ignore:
      - README.md

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    if: >-
      ${{ !startsWith(github.ref_name, 'chore/update-dotfiles-stats') &&
      (github.event_name != 'push' || github.event.head_commit.message != 'chore: update repository stats') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Collect statistics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH_NAME="${{ github.ref_name }}"

          # Keep commit count aligned with main, then account for this branch's upcoming squash merge commit.
          git fetch origin main --quiet

          UPDATED=$(gh repo view "${{ github.repository }}" \
            --json pushedAt -q '.pushedAt')

          # Exclude the current branch PR so this metric reflects other open PRs.
          CURRENT_BRANCH_PR=$(gh pr list \
            --state open \
            --head "$BRANCH_NAME" \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$CURRENT_BRANCH_PR" ]; then
            PRS=$(gh pr list \
              --state open \
              --json number \
              --jq "[.[] | select(.number != $CURRENT_BRANCH_PR)] | length")
          else
            PRS=$(gh pr list \
              --state open \
              --json number \
              --jq 'length')
          fi

          # Show the expected post-merge total seen on main.
          COMMITS=$(( $(git rev-list --count origin/main) + 1 ))

          cat > stats.txt << EOF
          \`\`\`text
          Commits     : $COMMITS
          Open PRs    : $PRS
          Last Update : ${UPDATED%%T*}
          \`\`\`
          EOF

      - name: Generate structure tree
        run: |
          # Rebuild the README structure snapshot from tracked dotfiles folders.
          python3 - << 'PY' > structure.txt
          from pathlib import Path

          roots = ["bootstrap", "common", "linux", "macos", "windows"]

          def sorted_entries(path: Path):
              entries = [p for p in path.iterdir() if p.name != ".git"]
              return sorted(entries, key=lambda p: (not p.is_dir(), p.name.lower(), p.name))

          def walk(path: Path, prefix: str):
              entries = sorted_entries(path)
              for i, entry in enumerate(entries):
                  last = i == len(entries) - 1
                  connector = "└── " if last else "├── "
                  name = entry.name + "/" if entry.is_dir() else entry.name
                  print(prefix + connector + name)
                  if entry.is_dir():
                      walk(entry, prefix + ("    " if last else "│   "))

          print("```text")
          print("dotfiles/")
          for i, root_name in enumerate(roots):
              root = Path(root_name)
              if not root.exists():
                  continue
              # Connector alignment is based on the roots that are present.
              present_roots = [r for r in roots if Path(r).exists()]
              last_root = root_name == present_roots[-1]
              connector = "└── " if last_root else "├── "
              print(connector + root_name + "/")
              walk(root, "    " if last_root else "│   ")
          print("```")
          PY

      - name: Update README
        run: |
          # Replace only generated blocks and keep all other README lines untouched.
          awk '
          BEGIN { in_block=0 }
          /<!-- STRUCTURE -->/ {
            print
            system("cat structure.txt")
            in_block=1
            next
          }
          /<!-- \/STRUCTURE -->/ {
            in_block=0
            print
            next
          }
          !in_block
          ' README.md > README.new

          mv README.new README.md

          awk '
          BEGIN { in_block=0 }
          /<!-- STATS -->/ {
            print
            system("cat stats.txt")
            in_block=1
            next
          }
          /<!-- \/STATS -->/ {
            in_block=0
            print
            next
          }
          !in_block
          ' README.md > README.new

          mv README.new README.md

      - name: Create pull request with stats update
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          sign-commits: true
          add-paths: README.md
          commit-message: "chore: update repository stats"
          base: "main"
          branch: "chore/update-dotfiles-stats"
          delete-branch: true
          title: "chore: update repository stats"
          body: |
            Automated README stats refresh from GitHub Actions.

      - name: Merge PR when possible
        if: steps.create_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.create_pr.outputs.pull-request-number }}"

          # Try repository auto-merge first; if it's disabled, attempt immediate merge.
          gh pr merge --auto --squash "$PR_NUMBER" || \
            gh pr merge --squash --delete-branch "$PR_NUMBER"
